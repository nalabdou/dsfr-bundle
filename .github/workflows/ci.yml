name: CI

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug output"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SYMFONY_REQUIRE: ""
  SYMFONY_DEPRECATIONS_HELPER: max[direct]=0
  COMPOSER_NO_INTERACTION: 1
  PHP_CS_FIXER_IGNORE_ENV: 1

jobs:
  static:
    name: "Static Analysis (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ["8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, openssl, mbstring
          tools: composer:v2, cs2pr
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist --optimize-autoloader

      - name: PHP-CS-Fixer (check only)
        run: |
          vendor/bin/php-cs-fixer fix \
            --dry-run \
            --diff \
            --format=checkstyle \
            | cs2pr
        continue-on-error: false

      - name: PHPStan
        run: |
          vendor/bin/phpstan analyse \
            --no-progress \
            --error-format=github
        env:
          SYMFONY_DEPRECATIONS_HELPER: disabled=1

      - name: Rector (dry-run)
        run: |
          vendor/bin/rector process \
            --dry-run \
            --no-progress-bar
        continue-on-error: false

  tests:
    name: "Tests · PHP ${{ matrix.php }} · SF ${{ matrix.symfony }} · ${{ matrix.deps }}"
    runs-on: ubuntu-latest
    needs: static

    continue-on-error: ${{ matrix.stability == 'dev' || matrix.deps == 'lowest' }}

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - php: "8.3"
            symfony: "6.4.*"
            deps: "lowest"
            stability: "stable"
            composer_flags: "--prefer-lowest --prefer-stable"

          - php: "8.3"
            symfony: "6.4.*"
            deps: "stable"
            stability: "stable"
            composer_flags: ""

          - php: "8.3"
            symfony: "7.4.*"
            deps: "stable"
            stability: "stable"
            composer_flags: ""

          - php: "8.3"
            symfony: "7.*"
            deps: "dev"
            stability: "dev"
            composer_flags: ""

          - php: "8.4"
            symfony: "6.4.*"
            deps: "stable"
            stability: "stable"
            composer_flags: ""

          - php: "8.4"
            symfony: "7.4.*"
            deps: "stable"
            stability: "stable"
            composer_flags: ""

          - php: "8.4"
            symfony: "7.*"
            deps: "dev"
            stability: "dev"
            composer_flags: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, openssl, mbstring
          tools: composer:v2, flex
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: >-
            composer-${{ runner.os }}-${{ matrix.php }}
            -sf${{ matrix.symfony }}-${{ matrix.deps }}
            -${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-sf${{ matrix.symfony }}-

      - name: Configure Symfony version
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-progress symfony/flex
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - name: Configure minimum stability
        if: matrix.stability == 'dev'
        run: composer config minimum-stability dev

      - name: Install dependencies
        run: |
          composer update \
            --no-progress \
            --prefer-dist \
            --optimize-autoloader \
            ${{ matrix.composer_flags }}
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - name: Show installed packages (debug)
        if: ${{ github.event.inputs.debug == 'true' }}
        run: composer show

      - name: Run PHPUnit
        run: |
          vendor/bin/phpunit \
            --testdox \
            --no-coverage
        env:
          SYMFONY_DEPRECATIONS_HELPER: >-
            ${{ matrix.deps == 'lowest' && 'disabled=1' || 'max[direct]=0' }}

  coverage:
      name: "Coverage · PHP 8.3 · SF 7.4"
      runs-on: ubuntu-latest
      needs: tests
      if: |
        github.event_name != 'schedule'
        && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')

      steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            fetch-depth: 2

        - name: Setup PHP 8.3
          uses: shivammathur/setup-php@v2
          with:
            php-version: "8.3"
            extensions: intl, openssl, mbstring
            tools: composer:v2, flex
            coverage: pcov
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Cache Composer
          uses: actions/cache@v5
          with:
            path: ~/.composer/cache
            key: composer-coverage-${{ hashFiles('composer.json') }}

        - name: Install dependencies
          run: composer update --no-progress --prefer-dist
          env:
            SYMFONY_REQUIRE: "7.4.*"       # ← was 7.1.*

        - name: Run PHPUnit with coverage
          run: |
            vendor/bin/phpunit \
              --coverage-clover=coverage/clover.xml \
              --coverage-xml=coverage/coverage-xml \
              --log-junit=coverage/junit.xml
          env:
            SYMFONY_DEPRECATIONS_HELPER: max[direct]=0

        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@v6
          with:
            files: coverage/clover.xml
            flags: unit
            name: dsfr-bundle
            fail_ci_if_error: false
            token: ${{ secrets.CODECOV_TOKEN }}

        - name: Upload coverage artifact
          uses: actions/upload-artifact@v7
          if: always()
          with:
            name: coverage-report
            path: coverage/
            retention-days: 7

  security:
    name: "Security Audit"
    runs-on: ubuntu-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Composer security audit
        run: |
          composer audit \
            --no-interaction \
            --format=plain

      - name: Check for abandoned packages
        run: |
          composer show --format=json | \
          php -r "
            \$data = json_decode(file_get_contents('php://stdin'), true);
            \$abandoned = array_filter(\$data['installed'] ?? [], fn(\$p) => \$p['abandoned'] ?? false);
            if (!empty(\$abandoned)) {
              echo 'Abandoned packages found:' . PHP_EOL;
              foreach (\$abandoned as \$p) {
                echo '  - ' . \$p['name'] . PHP_EOL;
              }
              exit(1);
            }
            echo 'No abandoned packages.' . PHP_EOL;
          "
        continue-on-error: true  # Warning, pas d'échec bloquant

  release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [tests, security, coverage]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extrait la section CHANGELOG.md entre ## [VERSION] et la suivante
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "DSFR Bundle ${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
